<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rànquing mundial de clubs de futbol</title>
<style>
  :root{
    --ink:#0d1b2a; --ink-soft:#48566a; --paper:#f7f6f2;
    --line:#e2ded4; --gold:#c8a24a; --gold-soft:#f0e6cc;
    --band:#ffffff; --band-alt:#fbfaf6;
    --up:#3a7d5c; --down:#b5533f; --pitch:#12351f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"Georgia","Times New Roman",serif;background:var(--paper);
    color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

  /* Barra d'idioma */
  .langbar{background:var(--ink);color:#fff}
  .langbar .wrap{display:flex;justify-content:flex-end;align-items:center;gap:2px;
    padding:0;flex-wrap:wrap}
  .lang{font-family:"Helvetica Neue",Arial,sans-serif;font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.1em;padding:9px 12px;cursor:pointer;
    color:#8fa598;background:none;border:none;transition:.15s}
  .lang:hover{color:#fff}
  .lang.on{color:var(--pitch);background:var(--gold)}

  header{background:linear-gradient(180deg,rgba(18,53,31,.94),rgba(13,27,42,.97)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0 40px,transparent 40px 80px);
    color:#fff;padding:44px 0 40px;border-bottom:3px solid var(--gold)}
  .eyebrow{font-family:"Helvetica Neue",Arial,sans-serif;text-transform:uppercase;
    letter-spacing:.28em;font-size:11px;font-weight:700;color:var(--gold);margin-bottom:14px}
  header h1{font-size:clamp(28px,4.6vw,50px);font-weight:400;letter-spacing:-.01em;
    line-height:1.06;max-width:18ch}
  header h1 em{font-style:italic;color:var(--gold)}
  .sub{margin-top:18px;max-width:58ch;color:#c9d2cc;font-size:16px}
  .meta{margin-top:26px;display:flex;flex-wrap:wrap;gap:28px;
    font-family:"Helvetica Neue",Arial,sans-serif}
  .meta div{display:flex;flex-direction:column}
  .meta .n{font-size:22px;font-weight:700;color:#fff}
  .meta .l{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#8fa598;margin-top:3px}

  .controls{position:sticky;top:0;z-index:10;background:rgba(247,246,242,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 0}
  .controls .wrap{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .search{flex:1;min-width:200px;font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:15px;padding:10px 14px;border:1px solid var(--line);border-radius:2px;
    background:#fff;color:var(--ink)}
  .search:focus{outline:2px solid var(--gold);outline-offset:-1px}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-family:"Helvetica Neue",Arial,sans-serif;font-size:12px;font-weight:600;
    text-transform:uppercase;letter-spacing:.08em;padding:9px 14px;border:1px solid var(--line);
    background:#fff;color:var(--ink-soft);border-radius:2px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--gold)}
  .chip.on{background:var(--pitch);color:#fff;border-color:var(--pitch)}

  main{padding:8px 0 60px}
  table{width:100%;border-collapse:collapse}
  thead th{font-family:"Helvetica Neue",Arial,sans-serif;font-size:11px;
    text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);font-weight:700;
    text-align:left;padding:16px 12px 10px;border-bottom:2px solid var(--ink);
    position:sticky;top:57px;background:var(--paper)}
  tbody tr{border-bottom:1px solid var(--line);background:var(--band)}
  tbody tr:nth-child(even){background:var(--band-alt)}
  tbody tr:hover{background:var(--gold-soft)}
  td{padding:14px 12px;vertical-align:middle}
  .rank{font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;font-size:18px;
    width:56px;color:var(--ink);text-align:center}
  tr[data-rank="1"] .rank,tr[data-rank="2"] .rank,tr[data-rank="3"] .rank{color:var(--gold)}
  .club{font-size:19px;font-weight:400}
  .club .flag{display:inline-block;width:22px;text-align:center;margin-right:8px;
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:13px}
  .country{font-family:"Helvetica Neue",Arial,sans-serif;font-size:12px;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.06em}
  .country-link{color:var(--ink-soft);text-decoration:none;cursor:pointer;
    border-bottom:1px dotted transparent;transition:.13s}
  .country-link:hover{color:var(--pitch);border-bottom-color:var(--pitch)}
  .club-link{color:var(--ink);text-decoration:none;cursor:pointer;
    border-bottom:1px dotted transparent;transition:.13s}
  .club-link:hover{color:var(--pitch);border-bottom-color:var(--pitch)}
  .rating{font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;font-size:18px;
    text-align:right;font-variant-numeric:tabular-nums}
  .conf{font-family:"Helvetica Neue",Arial,sans-serif;font-size:11px;text-align:center;width:44px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%}
  .dot.hi{background:var(--up)} .dot.mid{background:var(--gold)}
  .dot.lo{background:#c2c8cc}
  .empty{padding:50px;text-align:center;color:var(--ink-soft);font-style:italic}

  .note{font-family:"Helvetica Neue",Arial,sans-serif;font-size:13px;color:var(--ink-soft);
    border-top:1px solid var(--line);padding:22px 0 0;margin-top:8px;display:flex;gap:24px;
    flex-wrap:wrap;align-items:center}
  .note .k{display:flex;align-items:center;gap:7px}
  footer{background:var(--pitch);color:#c9d2cc;font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:13px;padding:30px 0;margin-top:40px}
  footer strong{color:#fff}
  @media(max-width:640px){.country,.conf-head,.conf{display:none}.club{font-size:16px}td{padding:12px 8px}}
</style>
<script src="paisos.js"></script>
</head>
<body>

<div class="langbar"><div class="wrap" id="langbar">
  <button class="lang on" data-lang="ca">CAT</button>
  <button class="lang" data-lang="es">ESP</button>
  <button class="lang" data-lang="en">ENG</button>
  <button class="lang" data-lang="fr">FRA</button>
  <button class="lang" data-lang="de">DEU</button>
  <button class="lang" data-lang="it">ITA</button>
  <button class="lang" data-lang="pt">POR</button>
</div></div>

<header>
  <div class="wrap">
    <div class="eyebrow" data-t="eyebrow"></div>
    <h1 data-t="title"></h1>
    <p class="sub" data-t="sub"></p>
    <div class="meta">
      <div><span class="n">645.116</span><span class="l" data-t="m_matches"></span></div>
      <div><span class="n">87</span><span class="l" data-t="m_countries"></span></div>
      <div><span class="n">10</span><span class="l" data-t="m_seasons"></span></div>
      <div><span class="n">0,86</span><span class="l" data-t="m_corr"></span></div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="wrap">
    <input class="search" id="q" data-t-ph="search">
    <div class="filters" id="filters">
      <button class="chip on" data-c="all" data-t="f_all"></button>
      <button class="chip" data-c="UEFA" data-t="f_uefa"></button>
      <button class="chip" data-c="CONMEBOL" data-t="f_conmebol"></button>
      <button class="chip" data-c="CONCACAF" data-t="f_concacaf"></button>
      <button class="chip" data-c="AFC" data-t="f_afc"></button>
      <button class="chip" data-c="CAF" data-t="f_caf"></button>
    </div>
  </div>
</div>

<main>
  <div class="wrap">
    <table>
      <thead><tr>
        <th style="text-align:center">#</th>
        <th data-t="th_club"></th>
        <th data-t="th_country"></th>
        <th class="conf-head" style="text-align:center" data-t="th_conf"></th>
        <th style="text-align:right" data-t="th_rating"></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none" data-t="empty"></div>
    <div class="note">
      <div class="k"><span class="dot hi"></span> <span data-t="conf_hi"></span></div>
      <div class="k"><span class="dot mid"></span> <span data-t="conf_mid"></span></div>
      <div class="k"><span class="dot lo"></span> <span data-t="conf_lo"></span></div>
      <div style="flex-basis:100%;color:#8a94a2" data-t="disclaimer"></div>
    </div>
  </div>
</main>

<footer><div class="wrap" data-t="footer"></div></footer>

  Anglaterra:{ca:"Anglaterra",es:"Inglaterra",en:"England",fr:"Angleterre",de:"England",it:"Inghilterra",pt:"Inglaterra"},
  Alemanya:{ca:"Alemanya",es:"Alemania",en:"Germany",fr:"Allemagne",de:"Deutschland",it:"Germania",pt:"Alemanha"},
  Espanya:{ca:"Espanya",es:"España",en:"Spain",fr:"Espagne",de:"Spanien",it:"Spagna",pt:"Espanha"},
  França:{ca:"França",es:"Francia",en:"France",fr:"France",de:"Frankreich",it:"Francia",pt:"França"},
  Itàlia:{ca:"Itàlia",es:"Italia",en:"Italy",fr:"Italie",de:"Italien",it:"Italia",pt:"Itália"},
  Portugal:{ca:"Portugal",es:"Portugal",en:"Portugal",fr:"Portugal",de:"Portugal",it:"Portogallo",pt:"Portugal"},
  Bèlgica:{ca:"Bèlgica",es:"Bélgica",en:"Belgium",fr:"Belgique",de:"Belgien",it:"Belgio",pt:"Bélgica"},
  "Països Baixos":{ca:"Països Baixos",es:"Países Bajos",en:"Netherlands",fr:"Pays-Bas",de:"Niederlande",it:"Paesi Bassi",pt:"Países Baixos"},
};

// Els noms i banderes de països vénen de paisos.js (font única, 87 països × 7 idiomes).

let DATA=[], lang='ca', filterConf='all';
const rows=document.getElementById('rows'), empty=document.getElementById('empty'), q=document.getElementById('q');

// Carrega les dades reals del motor.
fetch('dades.json')
  .then(r=>r.json())
  .then(j=>{
    DATA=j.clubs.map(c=>({
      id:c.id, r:c.world, club:c.club, country:c.country, conf:c.conf,
      flag:banderaPais(c.country), rating:c.rating,
      // confiança: alta si el club juga competició continental (té ponts al país)
      // confiança calculada al motor a partir dels ponts reals (partits
      // continentals del club) + divisió + connexió del seu país
      cf: c.fiab || 'mid', ponts: c.ponts||0,
    }));
    // omplir el comptador de partits a la capçalera si el JSON el porta
    if(j.meta){
      const el=document.querySelector('.meta .n'); // primer = partits
      if(el) el.textContent=j.meta.partits.toLocaleString('ca');
    }
    applyLang();
  })
  .catch(err=>{
    empty.style.display='block';
    empty.textContent='No s\'han pogut carregar les dades (dades.json). '+err;
  });

function applyLang(){
  const t=T[lang];
  document.querySelectorAll('[data-t]').forEach(el=>{el.innerHTML=t[el.dataset.t]});
  document.querySelectorAll('[data-t-ph]').forEach(el=>{el.placeholder=t[el.dataset.tPh]});
  document.documentElement.lang=lang;
  render();
}
function render(){
  const term=q.value.trim().toLowerCase();
  const list=DATA.filter(d=>{
    const okC=filterConf==='all'||d.conf===filterConf;
    const okQ=!term||d.club.toLowerCase().includes(term)||countryName(d.country).toLowerCase().includes(term);
    return okC&&okQ;
  });
  rows.innerHTML=list.map(d=>`
    <tr data-rank="${d.r}">
      <td class="rank">${d.r}</td>
      <td class="club"><span class="flag">${d.flag}</span><a class="club-link" data-club="${d.id}">${d.club}</a></td>
      <td class="country"><a class="country-link" data-country="${d.country}" title="${countryName(d.country)}">${countryName(d.country)}</a></td>
      <td class="conf"><span class="dot ${d.cf}"></span></td>
      <td class="rating">${d.rating.toLocaleString(lang)}</td>
    </tr>`).join('');
  empty.style.display=list.length?'none':'block';
}
// nom del país en l'idioma actual, via paisos.js
function countryName(c){ return nomPais(c, lang); }

document.getElementById('langbar').addEventListener('click',e=>{
  const b=e.target.closest('.lang');if(!b)return;
  document.querySelectorAll('.lang').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');lang=b.dataset.lang;applyLang();
});
document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  b.classList.add('on');filterConf=b.dataset.c;render();
});
// Clic sobre el nom del país → pàgina del país; sobre el club → fitxa del club
document.getElementById('rows').addEventListener('click',e=>{
  const cl=e.target.closest('.club-link');
  if(cl){ window.location.href='club.html?id='+encodeURIComponent(cl.dataset.club)+'&lang='+lang; return; }
  const a=e.target.closest('.country-link');if(!a)return;
  const key=a.dataset.country;
  window.location.href='pais.html?c='+encodeURIComponent(key)+'&lang='+lang;
});
